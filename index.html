<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Strategist Champion</title>
    <link rel="stylesheet" href="./CSS/index.css">
    <link rel="icon" href="./assets/chessIcon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top">
        <div class="logo"></div>
        <h1 class="topWord"><span class="strategistWord">Strategist</span><br>Champion</h1>
    </div>

    <div class="main">
        <div class="topSec">
            <div>
                <h1>Training Goals</h1>
                <p class="usedPlans"></p>
            </div>
            <button class="btn hoverBtn"><span>+</span> New</button>
        </div>
    </div>

    <div class="tasksBar"></div>

    <div class="overlay">
        <div class="inputCard">
            <h1 class="title">Set New Training Goal</h1>
            <h1 class="goalTitle">Goal Title</h1>
            <input type="text" class="goalInput" placeholder="e.g. Summer Open Prep">
            <div class="modePlatform">
                <div class="modeSec">
                    <h1 class="modeTitle">Mode</h1>
                    <div>
                        <select class="modeInput input">
                            <option value="self Improvement">Self Improvement</option>
                            <option value="competition Prep">Competition Prep</option>
                        </select>
                    </div>
                </div>
                <div class="platformSec">
                    <h1 class="titlePlatform">Training Platform</h1>
                    <div>
                        <select class="platformInput input">
                            <option value="CHESS.COM">Chess.com</option>
                            <option value="LICHESS">Lichess</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="ratingDuration">
                <div class="ratingSec">
                    <h1 class="ratingTitle">Starting Rating</h1>
                    <input type="number" class="ratingInput input" value="1200" placeholder="1200">
                </div>
                <div class="durationSec">
                    <h1 class="durationTitle">Duration</h1>
                    <div class="timeDate">
                        <div class="time">
                            <input type="number" class="durationInput input" value="1" min="1" required>
                        </div>
                        <div class="date">
                            <select class="dateInput input">
                                <option value="days">Days</option>
                                <option value="weeks">Weeks</option>
                                <option value="months">Months</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="checkFide">
                <label for="fide">
                    <input type="checkbox" id="fide">
                    <div>
                        <h1>Also track FIDE rating</h1>
                        <p>Adds two separate phases: a practice period and a competition period</p>
                    </div>
                </label>
            </div>
            <div class="btns">
                <button class="btn cancelBtn">Cancel</button>
                <button class="btn saveBtn">Create Goal</button>
            </div>
        </div>
    </div>

    <script src="./JS/index.js"></script>
</body>
</html>
