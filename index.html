<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Strategist Champion</title>
    <link rel="stylesheet" href="./CSS/index.css">
    <link rel="icon" href="./images/chessIcon.png">
</head>
<body>

    <div class="top">
        <div class="logo"></div>
        <h1 class="topWord"><span class="strategistWord">Strategist</span><br>Champion</h1>
    </div>

    <div class="main">
        <div class="topSec">
            <div>
                <h1>Training Goals</h1>
                <p>0/5 plans used</p>
            </div>
            <button class="btn"><span>+</span> New</button>
        </div>
    </div>

    <div class="tasksBar"></div>

    <div class="overlay">
        <div class="inputCard">
            <h1 class="title">Set New Training Goal</h1>
            <h1 class="goalTitle">Goal Title</h1>
            <input type="text" class="goalInput" placeholder="e.g. Summer Open Prep">
            <div class="modePlatform">
                <div class="modeSec">
                    <h1 class="modeTitle">Mode</h1>
                    <div>
                        <select class="modeInput">
                            <option value="Self Improvement">Self Improvement</option>
                            <option value="Competition Prep">Competition Prep</option>
                        </select>
                    </div>
                </div>
                <div class="platformSec">
                    <h1 class="platformTitle">Training Platform</h1>
                    <div>
                        <select class="platformInput">
                            <option value="Chess.com">Chess.com</option>
                            <option value="Lichess">Lichess</option>
                        </select>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script src="./JS/index.js"></script>
</body>
</html>
