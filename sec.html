<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategist Champion</title>
    <link rel="stylesheet" href="./sec.css">
    <link rel="icon" href="./assets/chessIcon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="topSec">
        <div class="logo"></div>
        <h1 class="topWord"><span class="strategistWord">Strategist</span><br>Champion</h1>
    </div>
    
    <div class="top">
        <div class="leftSec">
            <div class="modes">
                <p class="platform1"></p>
                <p class="platform3"></p>
            </div>
            <h1 class="title"></h1>
            <p class="dateTime"></p>
        </div>
        <div class="rightSec">
            <button class="Btn btnLogRating"><span>+</span>&nbsp; Log Rating</button>
            <div class="bgBin">
                <div class="bin"></div>
            </div>
            <div class="bgCross">
                <div class="cross"></div>
            </div>
        </div>
    </div>

    <div class="main">

        <div class="ratingSecFullWidth">
            <div class="ratingAndDuration">
                <div class="ratingSec">
                    <p>Current Rating</p>
                    <h3 class="currentRating"></h3>
                </div>
                <div class="durationSec">
                    <p>Days Left</p>
                    <h3 class="remainingDays"></h3>
                </div>
            </div>
        </div>
    
        <div class="diagram">
            <div class="ratingJourney">
                <div class="ratingTopTexts">
                    <p class="ratingJourneyText">Rating Journey</p>
                    <div class="differenceText">
                        <div class="img"></div>
                    </div>
                </div>
                <div class="ratingOverlay">
                    <div class="ratingOnOverlay onOverlay"></div>
                </div>
                <div class="texts">
                    <p class="startRating"></p>
                    <p class="currentRatingText"></p>
                </div>
            </div>
            <div class="practicePhase">
                <div class="ratingTopTexts">
                    <p class="timeProgress"></p>
                    <p class="num percentageText"></p>
                </div>
                <div class="ratingOverlay">
                    <div class="timeOnOverlay onOverlay"></div>
                </div>
                <div class="texts">
                    <p class="startDate"></p>
                    <p class="lastDate"></p>
                </div>    
            </div>
        </div>

        <div class="ratingHistory">
            <p class="ratingHis">RATING HISTORY</p>
            <div class="ratingHistorySec">
                <p class="historyText"></p>
            </div>
        </div>

    </div>

    <div class="overlay">
        <div class="inputCard">
            <h1 class="title">Log New Rating</h1>
            <p class="describe"></p>
            <div class="ratingSection">
                <p class="newRatingText">New Rating</p>
                <input type="number" class="ratingValue">
            </div>
            <hr>
            <div class="buttons">
                <button class="cancel">Cancel</button>
                <button class="Btn save">Save Entry</button>
            </div>
        </div>
    </div>
    
    <div class="overlayForFide">
        <div class="inputCardForFide">
            <h1 class="title">Log New Rating</h1>
            <p class="describeForFide">Recording a FIDE tournament result</p>
            <div class="ratingSection">
                <p class="newRatingText">New Rating</p>
                <input type="number" class="ratingValueForFide">
            </div>
            <hr>
            <div class="buttons">
                <button class="cancelForFide">Cancel</button>
                <button class="Btn saveForFide">Save Entry</button>
            </div>
        </div>
    </div>

    <div class="resultOverlay">
        <div class="resultCard">
            <div class="resultTitle">
                <div class="flag"></div>
                <h1 class="resultTitleText">Time's Up — Period Summary</h1>
            </div>
            <div class="informations">
                <div class="duration">
                    <div class="durationIcon"></div>
                    <div class="durationTexts">
                        <div class="durationTopText">Duration</div>
                        <div class="durationText">14 days</div>
                    </div>
                </div>
                <div class="ratingDifference">
                    <div class="ratingDifferenceIcon"></div>
                    <div class="ratingDifferenceTexts">
                        <div class="ratingDifferenceTopText">Rating Difference</div>
                        <div class="ratingDifferenceText">+200</div>
                    </div>
                </div>
                <div class="finalRating">
                    <div class="finalRatingIcon"></div>
                    <div class="finalRatingTexts">
                        <div class="finalRatingTopText">Final Rating</div>
                        <div class="finalRatingText">1200 -> 1400</div>
                    </div>
                </div>
            </div>
            <div class="buttonsSec">
                <button class="backToGoals">Back To Goals</button>
                <button class="removePlan">Remove Plan</button>
            </div>
        </div>
    </div>
    
    <script src="./sec.js"></script>
</body>
</html>
