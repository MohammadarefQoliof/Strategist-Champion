<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategist Champion</title>
    <link rel="stylesheet" href="../CSS/sec.css">
    <link rel="icon" href="../assets/chessIcon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="topSec">
        <div class="logo"></div>
        <h1 class="topWord"><span class="strategistWord">Strategist</span><br>Champion</h1>
    </div>
    
    <div class="top">
        <div class="leftSec">
            <div class="modes">
                <p class="platform1">CHESS.COM</p>
                <p class="platform2"></p>
                <p class="platform3">IMPROVEMENT</p>
            </div>
            <h1 class="title">Self Improvement</h1>
            <p class="dateTime">Mar 25, 2026 — Apr 25, 2026</p>
        </div>
        <div class="rightSec">
            <button><span>+</span>&nbsp; Log Rating</button>
            <div class="bgBin">
                <div class="bin"></div>
            </div>
            <div class="bgCross">
                <div class="cross"></div>
            </div>
        </div>
    </div>

    <div class="main">

        <div class="ratingAndDuration">
            <div class="ratingSec">
                <p>Current Rating</p>
                <h3>1500</h3>
            </div>
            <div class="durationSec">
                <p>Days Left</p>
                <h3>30</h3>
            </div>
        </div>
    
        <div class="diagram">
            <div class="ratingJourney">
                
            </div>
            <div class="practicePhase">
    
            </div>
        </div>

        <div class="ratingHistory">
            <p>RATING HISTORY</p>
            <div class="ratingHistorySec"></div>
        </div>

    </div>

    
    <script src="../JS/sec1.js"></script>
</body>
</html>
