<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategist Champion</title>
    <link rel="stylesheet" href="../CSS/sec.css">
    <link rel="icon" href="../assets/chessIcon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="topSec">
        <div class="logo"></div>
        <h1 class="topWord"><span class="strategistWord">Strategist</span><br>Champion</h1>
    </div>
    
    <div class="top">
        <div class="leftSec">
            <div class="modes">
                <p class="platform1"></p>
                <p class="platform2"></p>
                <p class="platform3"></p>
            </div>
            <h1 class="title"></h1>
            <p class="dateTime"></p>
        </div>
        <div class="rightSec">
            <button class="Btn"><span>+</span>&nbsp; Log Rating</button>
            <div class="bgBin">
                <div class="bin"></div>
            </div>
            <div class="bgCross">
                <div class="cross"></div>
            </div>
        </div>
    </div>

    <div class="main">

        <div class="ratingAndDuration">
            <div class="ratingSec">
                <p>Current Rating</p>
                <h3 class="currentRating"></h3>
            </div>
            <div class="durationSec">
                <p>Days Left</p>
                <h3 class="remainingDays"></h3>
            </div>
        </div>
    
        <div class="diagram">
            <div class="ratingJourney">
                <div class="ratingTopTexts">
                    <p>Rating Journey</p>
                    <div class="differenceText">
                        <div class="img"></div>
                    </div>
                </div>
                <div class="ratingOverlay">
                    <div class="ratingOnOverlay onOverlay"></div>
                </div>
                <div class="texts">
                    <p class="startRating"></p>
                    <p class="currentRatingText"></p>
                </div>
            </div>
            <div class="practicePhase">
                <div class="ratingTopTexts">
                    <p>TIME PROGRESS</p>
                    <p class="num percentageText"></p>
                </div>
                <div class="ratingOverlay">
                    <div class="timeOnOverlay onOverlay"></div>
                </div>
                <div class="texts">
                    <p class="startDate"></p>
                    <p class="lastDate"></p>
                </div>    
            </div>
        </div>

        <div class="ratingHistory">
            <p class="ratingHis">RATING HISTORY</p>
            <div class="ratingHistorySec">
                <p>No entries yet. Log your first rating!</p>
            </div>
        </div>

    </div>

    <div class="overlay">
        <div class="inputCard">
            <h1 class="title">Log New Rating</h1>
            <p class="describe">Recording a Chess.com practice rating</p>
            <div class="ratingSection">
                <p class="newRatingText">New Rating</p>
                <input type="number" class="ratingValue">
            </div>
            <hr>
            <div class="buttons">
                <button class="cancel">Cancel</button>
                <button class="Btn save">Save Entry</button>
            </div>
        </div>
    </div>
    
    <script src="../JS/sec1.js"></script>
</body>
</html>
